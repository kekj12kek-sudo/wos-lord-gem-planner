<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>WOS Planner</title>
<style>
:root{--line:#78d4ff55;--text:#eefaff}
*{box-sizing:border-box}
body{margin:0;color:var(--text);font-family:system-ui,sans-serif;background:linear-gradient(180deg,#061524,#0b2b45 55%,#061524);font-weight:800}
.app{max-width:560px;margin:0 auto;padding:10px 8px 40px}
.header{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.title{background:#0e3151;border:1px solid var(--line);border-radius:14px;padding:8px 12px;font-size:17px;box-shadow:0 7px 18px #0008}
.tabs{display:flex;gap:6px}
.tab{border:0;border-radius:999px;padding:8px 12px;color:#fff;background:#176596;font-weight:1000;cursor:pointer;font-size:13px}
.tab.active{background:linear-gradient(#ffcf62,#f39d22);color:#201100}
.card{background:#0e3151dd;border:1px solid var(--line);border-radius:16px;padding:10px;margin:8px 0;box-shadow:0 8px 20px #0008}
.cardTitle{font-size:12px;color:#d8f1ff;margin-bottom:6px}
.levelBox{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field label{display:flex;align-items:center;font-size:11px;color:#aad8ef;margin:0 0 4px 2px;gap:4px}
select,input{width:100%;border:1px solid #8bd8ff66;background:#071d31;color:#fff;border-radius:10px;padding:10px;font-size:15px;font-weight:900;outline:none}
.bulkBtn{width:100%;border:1px solid #8bd8ff66;background:#12446f;color:#fff;border-radius:12px;padding:10px;font-size:14px;font-weight:1000;cursor:pointer;margin-top:6px}
.help{font-size:11px;color:#d8f1ff;margin-top:6px}
.matIcon{width:24px;height:24px;object-fit:contain;flex-shrink:0}
.reset{width:100%;border:1px solid #ffbd5c88;background:linear-gradient(#ffcc64,#e8941d);color:#231200;border-radius:14px;padding:11px;font-size:15px;font-weight:1000;margin-top:10px;cursor:pointer}
.totalBox{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.totalBox3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.resultItem{background:#09243b;border:1px solid #7bd3ff33;border-radius:12px;padding:8px}
.resultItem.lack{border-color:#ff667766;background:#351725}
.resultLabel{color:#a8d8ef;font-size:11px;display:flex;align-items:center;gap:4px}
.resultValue{font-size:18px;color:#fff;margin-top:2px}
.tabContent{display:none}.tabContent.active{display:block}

/* ステージ共通 */
.stage,.gearStage{position:relative;border-radius:18px;overflow:hidden;aspect-ratio:1/1;box-shadow:0 8px 24px #0009;border:1px solid #7bd3ff33;margin-top:8px}
.stage{background:#0c2f4d}
.stageImg{position:absolute;inset:0;background-image:url('gem_bg.webp');background-size:cover;background-position:center}
.gearStage{background-image:url('gear_bg.webp');background-size:cover;background-position:center}

/* タップボタン */
.gemHot{position:absolute;width:14%;aspect-ratio:1;border:0;padding:0;background:radial-gradient(circle,#ffffff18,transparent 70%);transform:translate(-50%,-50%);cursor:pointer;z-index:10;border-radius:50%;animation:tapPulse 2s ease-in-out infinite}
.gemHot:active{transform:translate(-50%,-50%) scale(0.85)!important}
.badge{position:absolute;right:-8px;top:-5px;min-width:26px;height:20px;display:grid;place-items:center;padding:0 4px;background:linear-gradient(#ff6d78,#d82337);border:2px solid #fff;border-radius:999px;color:#fff;font-size:10px;line-height:1;pointer-events:none}
.gemHot[data-type="shield"]{left:50%;top:30%}
.gemHot[data-type="lancer"]{left:35%;top:63%}
.gemHot[data-type="marks"]{left:65%;top:63%}
@keyframes tapPulse{0%,100%{box-shadow:0 0 0 0 #ffffff44}60%{box-shadow:0 0 0 12px #ffffff00}}
.gearHot{position:absolute;border:0;padding:0;background:radial-gradient(circle,#ffffff18,transparent 70%);transform:translate(-50%,-50%);cursor:pointer;z-index:10;width:32%;aspect-ratio:1;border-radius:50%;animation:tapPulse 2s ease-in-out infinite;left:50%;top:52%}
.gearHot:active{transform:translate(-50%,-50%) scale(0.85)!important}

/* サマリ */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.gemSummary{background:#09243b;border:1px solid #7bd3ff44;border-radius:14px;padding:8px;text-align:center;font-size:11px}
.gemSummary strong{display:block;font-size:13px;color:#fff;margin-bottom:2px}
.gearSlots{margin:8px 0}
.gearSlot{background:#09243b;border:1px solid #7bd3ff44;border-radius:14px;padding:10px;font-size:12px}
.gearSlot strong{display:block;font-size:13px;color:#fff;margin-bottom:4px}
.gearSlot.hasData{border-color:#4af07a66}

/* モーダル */
.modalOverlay{position:fixed;inset:0;background:#000a;display:none;align-items:flex-end;justify-content:center;z-index:1000;padding:0}
.modalOverlay.show{display:flex}
.modal{width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;background:#0e3151;border:1px solid #8bd8ff77;border-radius:18px 18px 0 0;box-shadow:0 -8px 30px #000c;overflow:hidden}
.modalHead{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #8bd8ff33;flex-shrink:0}
.modalTitle{font-size:16px}
.modalHeadBtns{display:flex;gap:8px}
.closeBtn{border:0;background:#072035;color:#fff;border-radius:10px;padding:8px 12px;font-weight:1000;cursor:pointer;font-size:13px}
.clearBtn{border:0;background:#4a1520;color:#ff9999;border-radius:10px;padding:8px 12px;font-weight:1000;cursor:pointer;font-size:13px}
.modalTabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 14px;flex-shrink:0}
.modeBtn{border:1px solid #8bd8ff66;background:#08243d;color:#fff;border-radius:12px;padding:11px;font-weight:1000;cursor:pointer;font-size:14px}
.modeBtn.active{background:linear-gradient(#ffcf62,#f39d22);color:#201100}

/* スプライット */
.spriteScroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0 16px;display:flex;justify-content:center}
.spriteWrap{position:relative;width:55vw;max-width:240px;flex-shrink:0;align-self:flex-start;background:#09243b;border:1px solid #7bd3ff33;border-radius:12px;cursor:pointer}
.spriteWrap img{display:block;width:100%;height:auto;pointer-events:none;border-radius:12px}
.hlBar{position:absolute;left:0;right:0;pointer-events:none;border-radius:4px}
.hlBar.cur{background:#4af07a33;border:2px solid #4af07aaa}
.hlBar.tgt{background:#ff9f3333;border:2px solid #ff9f33aa}
.hlBar.hover{background:#ffffff18;border:2px solid #ffffff66}
.spriteLeft{position:absolute;top:0;left:0;width:50%;z-index:2;cursor:pointer}
.spriteRight{position:absolute;top:0;right:0;width:50%;z-index:2;cursor:pointer}

/* ポップ */
.pop{position:fixed;inset:0;display:none;align-items:flex-end;justify-content:center;z-index:1100;background:#000a;padding:0}
.pop.show{display:flex}
.popBox{width:100%;max-width:560px;background:#0e3151;border:1px solid #8bd8ff77;border-radius:18px 18px 0 0;padding:16px 14px calc(16px + env(safe-area-inset-bottom))}
.popTitle{margin-bottom:12px;font-size:15px}
.popGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.popGridSet{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.popBtn{border:0;background:#15537f;color:#fff;border-radius:12px;padding:14px 4px;font-size:15px;font-weight:1000;cursor:pointer}
.popBtn.main{background:linear-gradient(#ffcf62,#f39d22);color:#201100}
.popClose{margin-top:10px;width:100%;border:1px solid #8bd8ff66;background:#061d31;color:#fff;border-radius:12px;padding:13px;font-weight:1000;cursor:pointer;font-size:15px}
</style>
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">WOS Planner</div>
    <div class="tabs">
      <button class="tab active" data-tab="gem">宝石LvUP</button>
      <button class="tab" data-tab="gear">装備強化</button>
    </div>
  </div>

  <!-- ===== 宝石タブ ===== -->
  <div class="tabContent active" id="tab-gem">
    <div class="card">
      <div class="levelBox">
        <div class="field"><label>現在Lv</label><select id="bulkCurrent"></select></div>
        <div class="field"><label>目標Lv</label><select id="bulkTarget"></select></div>
      </div>
      <button class="bulkBtn" id="applyAll">全宝石に一括適用</button>
      <div class="help">宝石タップ＝個別設定 / 緑＝現在Lv / 橙＝目標Lv</div>
    </div>
    <div class="stage">
      <div class="stageImg"></div>
      <button class="gemHot" data-type="shield"><span class="badge" id="badge-shield">0個</span></button>
      <button class="gemHot" data-type="lancer"><span class="badge" id="badge-lancer">0個</span></button>
      <button class="gemHot" data-type="marks"><span class="badge" id="badge-marks">0個</span></button>
    </div>
    <div class="summary">
      <div class="gemSummary" id="sum-shield"><strong>盾宝石</strong>現在：未設定<br>目標：未設定</div>
      <div class="gemSummary" id="sum-lancer"><strong>槍宝石</strong>現在：未設定<br>目標：未設定</div>
      <div class="gemSummary" id="sum-marks"><strong>弓宝石</strong>現在：未設定<br>目標：未設定</div>
    </div>
    <div class="card">
      <div class="cardTitle">所持素材</div>
      <div class="levelBox">
        <div class="field"><label><img src="mat_gem_plan.png" class="matIcon"> 宝石図面</label><input id="havePlan" type="number" min="0" value="0"></div>
        <div class="field"><label><img src="mat_gem_book.png" class="matIcon"> 宝石ハンドブック</label><input id="haveBook" type="number" min="0" value="0"></div>
        <div class="field"><label><img src="mat_gem_secret.png" class="matIcon"> 宝石秘典</label><input id="haveSecret" type="number" min="0" value="0"></div>
      </div>
    </div>
    <div class="card">
      <div class="cardTitle">必要素材</div>
      <div class="totalBox3">
        <div class="resultItem"><div class="resultLabel"><img src="mat_gem_plan.png" class="matIcon"> 宝石図面</div><div class="resultValue" id="needPlan">0</div></div>
        <div class="resultItem"><div class="resultLabel"><img src="mat_gem_book.png" class="matIcon"> 宝石ハンドブック</div><div class="resultValue" id="needBook">0</div></div>
        <div class="resultItem"><div class="resultLabel"><img src="mat_gem_secret.png" class="matIcon"> 宝石秘典</div><div class="resultValue" id="needSecret">0</div></div>
      </div>
      <div class="cardTitle" style="margin-top:10px">不足素材</div>
      <div class="totalBox3">
        <div class="resultItem lack"><div class="resultLabel"><img src="mat_gem_plan.png" class="matIcon"> 宝石図面</div><div class="resultValue" id="lackPlan">0</div></div>
        <div class="resultItem lack"><div class="resultLabel"><img src="mat_gem_book.png" class="matIcon"> 宝石ハンドブック</div><div class="resultValue" id="lackBook">0</div></div>
        <div class="resultItem lack"><div class="resultLabel"><img src="mat_gem_secret.png" class="matIcon"> 宝石秘典</div><div class="resultValue" id="lackSecret">0</div></div>
      </div>
      <button class="reset" id="resetGem">設定をリセット</button>
    </div>
  </div>

  <!-- ===== 装備タブ ===== -->
  <div class="tabContent" id="tab-gear">
    <div class="card">
      <div class="levelBox">
        <div class="field"><label>現在レベル</label><select id="gearBulkCurrent"></select></div>
        <div class="field"><label>目標レベル</label><select id="gearBulkTarget"></select></div>
      </div>
      <button class="bulkBtn" id="gearApplyAll">全装備に一括適用（6部位）</button>
      <div class="help">中央の装備タップ＝個別設定 / 緑＝現在レベル / 橙＝目標レベル</div>
    </div>
    <!-- 装備ステージ: 背景画像 + 中央タップのみ -->
    <div class="gearStage" id="gearStage">
      <button class="gearHot" id="gearCenterBtn" style="left:50%;top:52%"></button>
    </div>
    <!-- スロット一覧 -->
    <div class="gearSlots" id="gearSlots"></div>
    <div class="card">
      <div class="cardTitle">所持素材</div>
      <div class="levelBox">
        <div class="field"><label><img src="mat_alloy.png" class="matIcon"> 合金</label><input id="haveAlloy" type="number" min="0" value="0"></div>
        <div class="field"><label><img src="mat_polish.png" class="matIcon"> 研磨剤</label><input id="havePolish" type="number" min="0" value="0"></div>
        <div class="field"><label><img src="mat_plan.png" class="matIcon"> 設計図面</label><input id="havePlanG" type="number" min="0" value="0"></div>
        <div class="field"><label><img src="mat_amber.png" class="matIcon"> 琥珀</label><input id="haveAmber" type="number" min="0" value="0"></div>
      </div>
    </div>
    <div class="card">
      <div class="cardTitle">必要素材</div>
      <div class="totalBox" style="grid-template-columns:repeat(2,1fr)">
        <div class="resultItem"><div class="resultLabel"><img src="mat_alloy.png" class="matIcon"> 合金</div><div class="resultValue" id="needAlloy">0</div></div>
        <div class="resultItem"><div class="resultLabel"><img src="mat_polish.png" class="matIcon"> 研磨剤</div><div class="resultValue" id="needPolish">0</div></div>
        <div class="resultItem"><div class="resultLabel"><img src="mat_plan.png" class="matIcon"> 設計図面</div><div class="resultValue" id="needPlanG">0</div></div>
        <div class="resultItem"><div class="resultLabel"><img src="mat_amber.png" class="matIcon"> 琥珀</div><div class="resultValue" id="needAmber">0</div></div>
      </div>
      <div class="cardTitle" style="margin-top:14px">不足素材</div>
      <div class="totalBox" style="grid-template-columns:repeat(2,1fr)">
        <div class="resultItem lack"><div class="resultLabel"><img src="mat_alloy.png" class="matIcon"> 合金</div><div class="resultValue" id="lackAlloy">0</div></div>
        <div class="resultItem lack"><div class="resultLabel"><img src="mat_polish.png" class="matIcon"> 研磨剤</div><div class="resultValue" id="lackPolish">0</div></div>
        <div class="resultItem lack"><div class="resultLabel"><img src="mat_plan.png" class="matIcon"> 設計図面</div><div class="resultValue" id="lackPlanG">0</div></div>
        <div class="resultItem lack"><div class="resultLabel"><img src="mat_amber.png" class="matIcon"> 琥珀</div><div class="resultValue" id="lackAmber">0</div></div>
      </div>
      <button class="reset" id="resetGear">設定をリセット</button>
    </div>
  </div>
</div>

<!-- 宝石モーダル -->
<div class="modalOverlay" id="gemModal">
  <div class="modal">
    <div class="modalHead">
      <div class="modalTitle" id="gemModalTitle">宝石の設定</div>
      <div class="modalHeadBtns">
        <button class="clearBtn" id="clearGemModal">クリア</button>
        <button class="closeBtn" id="closeGemModal">閉じる</button>
      </div>
    </div>
    <div class="modalTabs">
      <button class="modeBtn active" data-mode="current">現在レベル</button>
      <button class="modeBtn" data-mode="target">目標レベル</button>
    </div>
    <div class="spriteScroll">
      <div class="spriteWrap" id="gemSpriteWrap">
        <img id="gemSpriteImg" src="" alt="">
        <div class="hlBar cur" id="gemHlCur" style="display:none"></div>
        <div class="hlBar tgt" id="gemHlTgt" style="display:none"></div>
        <div class="hlBar hover" id="gemHlHover" style="display:none"></div>
        <div class="spriteLeft" id="gemSpriteLeft"></div>
        <div class="spriteRight" id="gemSpriteRight"></div>
      </div>
    </div>
  </div>
</div>

<!-- 装備モーダル -->
<div class="modalOverlay" id="gearModal">
  <div class="modal">
    <div class="modalHead">
      <div class="modalTitle" id="gearModalTitle">装備の設定</div>
      <div class="modalHeadBtns">
        <button class="clearBtn" id="clearGearModal">クリア</button>
        <button class="closeBtn" id="closeGearModal">閉じる</button>
      </div>
    </div>
    <div class="modalTabs">
      <button class="modeBtn gearModeBtn active" data-mode="current">現在レベル</button>
      <button class="modeBtn gearModeBtn" data-mode="target">目標レベル</button>
    </div>
    <div class="spriteScroll">
      <div class="spriteWrap" id="gearSpriteWrap">
        <img id="gearSpriteImg" src="gear_sprite.png" alt="">
        <div class="hlBar cur" id="gearHlCur" style="display:none"></div>
        <div class="hlBar tgt" id="gearHlTgt" style="display:none"></div>
        <div class="hlBar hover" id="gearHlHover" style="display:none"></div>
      </div>
    </div>
  </div>
</div>

<!-- ポップ -->
<div class="pop" id="pop">
  <div class="popBox">
    <div class="popTitle" id="popTitle"></div>
    <div class="popGrid" id="popGrid"></div>
    <div class="popGridSet" id="popGridSet" style="display:none"></div>
    <button class="popClose" id="popClose">閉じる</button>
  </div>
</div>

<script>
// ===== 宝石データ =====
const GEM_COSTS={0:{plan:5,book:5,secret:0},1:{plan:15,book:40,secret:0},2:{plan:40,book:60,secret:0},3:{plan:100,book:80,secret:0},4:{plan:200,book:100,secret:0},5:{plan:300,book:120,secret:0},6:{plan:400,book:140,secret:0},7:{plan:400,book:200,secret:0},8:{plan:400,book:300,secret:0},9:{plan:420,book:420,secret:0},10:{plan:420,book:560,secret:0},11:{plan:450,book:580,secret:15},12:{plan:450,book:580,secret:30},13:{plan:500,book:600,secret:45},14:{plan:500,book:600,secret:70},15:{plan:550,book:650,secret:100}};
const GEM_INFO={shield:{name:"盾宝石",img:"gem_green.png"},lancer:{name:"槍宝石",img:"gem_blue.png"},marks:{name:"弓宝石",img:"gem_orange.png"}};
const GEM_ROWS=16;

// ===== 装備データ =====
const GEAR_LV_NAMES=["レジェT2★★★","神話","神話★","神話★★","神話★★★","神話T1","神話T1★","神話T1★★","神話T1★★★","神話T2","神話T2★","神話T2★★","神話T2★★★","神話T3","神話T3★","神話T3★★","神話T3★★★","神話T4","神話T4★","神話T4★★","神話T4★★★"];
const GEAR_COSTS=[
  {alloy:50000,polish:530,plan:85,amber:10},
  {alloy:52000,polish:560,plan:90,amber:10},
  {alloy:54000,polish:590,plan:95,amber:10},
  {alloy:56000,polish:620,plan:100,amber:10},
  {alloy:59000,polish:670,plan:110,amber:15},
  {alloy:61000,polish:700,plan:115,amber:15},
  {alloy:63000,polish:730,plan:120,amber:15},
  {alloy:65000,polish:760,plan:125,amber:15},
  {alloy:68000,polish:810,plan:135,amber:20},
  {alloy:70000,polish:840,plan:140,amber:20},
  {alloy:72000,polish:870,plan:145,amber:20},
  {alloy:74000,polish:900,plan:150,amber:20},
  {alloy:77000,polish:950,plan:160,amber:25},
  {alloy:80000,polish:990,plan:165,amber:25},
  {alloy:83000,polish:1030,plan:170,amber:25},
  {alloy:86000,polish:1070,plan:180,amber:25},
  {alloy:120000,polish:1500,plan:250,amber:40},
  {alloy:140000,polish:1650,plan:275,amber:40},
  {alloy:160000,polish:1800,plan:300,amber:40},
  {alloy:180000,polish:1950,plan:325,amber:40},
];
const GEAR_ROWS=21;
const gearState={
  current:Array(21).fill(0),
  target:Array(21).fill(0)
};

// ===== 宝石state =====
const gemState={
  shield:{current:Array(17).fill(0),target:Array(17).fill(0)},
  lancer:{current:Array(17).fill(0),target:Array(17).fill(0)},
  marks:{current:Array(17).fill(0),target:Array(17).fill(0)}
};
let activeGem="shield",activeGemMode="current";
let activeGearSlot=0,activeGearMode="current";
let pending={type:null,gem:null,mode:null,lv:null,slot:null};

function fmt(n){return Number(n||0).toLocaleString("ja-JP")}
function total(a){return a.reduce((s,v)=>s+v,0)}
function summarize(a){const p=[];for(let i=1;i<=16;i++)if(a[i])p.push(`Lv${i}×${a[i]}`);return p.length?p.join(" / "):"未設定"}

// ===== タブ切り替え =====
document.querySelectorAll(".tab[data-tab]").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tab[data-tab]").forEach(b=>b.classList.toggle("active",b===btn));
    document.querySelectorAll(".tabContent").forEach(c=>c.classList.toggle("active",c.id==="tab-"+btn.dataset.tab));
  });
});

// ===== 宝石 =====
function fillSelects(){
  const c=document.getElementById("bulkCurrent"),t=document.getElementById("bulkTarget");
  for(let i=0;i<=16;i++)c.add(new Option("Lv"+i,i));
  for(let i=1;i<=16;i++)t.add(new Option("Lv"+i,i));
  c.value=1;t.value=16;
}
function gemBuildPairs(gem){
  const cur=[],tar=[];
  for(let lv=0;lv<=16;lv++){for(let i=0;i<gemState[gem].current[lv];i++)cur.push(lv);for(let i=0;i<gemState[gem].target[lv];i++)tar.push(lv)}
  const pairs=[];
  for(let i=0;i<Math.min(cur.length,tar.length);i++)if(tar[i]>cur[i])pairs.push({from:cur[i],to:tar[i]});
  return pairs;
}
function gemCalcOne(from,to){let plan=0,book=0,secret=0;for(let lv=from;lv<to;lv++){const r=GEM_COSTS[lv]||{};plan+=r.plan||0;book+=r.book||0;secret+=r.secret||0}return{plan,book,secret}}
function gemCalcAll(){const need={plan:0,book:0,secret:0};for(const gem of Object.keys(gemState))for(const p of gemBuildPairs(gem)){const c=gemCalcOne(p.from,p.to);need.plan+=c.plan;need.book+=c.book;need.secret+=c.secret}return need}
function gemTotal(gem,mode){return gemState[gem][mode].reduce((s,v)=>s+v,0)}
function gemAllTotal(mode){return Object.keys(GEM_INFO).reduce((s,gem)=>s+gemTotal(gem,mode),0)}

function renderGem(){
  for(const gem of Object.keys(GEM_INFO)){
    const ct=total(gemState[gem].current),tt=total(gemState[gem].target);
    document.getElementById("badge-"+gem).textContent=ct+"個";
    document.getElementById("sum-"+gem).innerHTML=`<strong>${GEM_INFO[gem].name}</strong>現在：${summarize(gemState[gem].current)}<br>目標：${summarize(gemState[gem].target)}<br>設定：現在${ct}個 / 目標${tt}個`;
  }
  const need=gemCalcAll();
  document.getElementById("needPlan").textContent=fmt(need.plan);
  document.getElementById("needBook").textContent=fmt(need.book);
  document.getElementById("needSecret").textContent=fmt(need.secret);
  document.getElementById("lackPlan").textContent=fmt(Math.max(0,need.plan-Number(document.getElementById("havePlan").value||0)));
  document.getElementById("lackBook").textContent=fmt(Math.max(0,need.book-Number(document.getElementById("haveBook").value||0)));
  document.getElementById("lackSecret").textContent=fmt(Math.max(0,need.secret-Number(document.getElementById("haveSecret").value||0)));
  if(document.getElementById("gemModal").classList.contains("show"))updateGemHighlights();
}

// 宝石モーダル
const gemSpriteImg=document.getElementById("gemSpriteImg");
const gemHlCur=document.getElementById("gemHlCur");
const gemHlTgt=document.getElementById("gemHlTgt");
const gemHlHover=document.getElementById("gemHlHover");
const gemSpriteLeft=document.getElementById("gemSpriteLeft");
const gemSpriteRight=document.getElementById("gemSpriteRight");

function gemRowH(){return gemSpriteImg.offsetHeight/GEM_ROWS}
function gemYToLv(y){return Math.min(GEM_ROWS,Math.max(1,Math.ceil(y/gemRowH())))}
function gemLvToRect(lv){const h=gemRowH();return{top:(lv-1)*h,h}}

function updateGemHighlights(){
  const imgH=gemSpriteImg.offsetHeight;if(!imgH)return;
  const curLv=gemState[activeGem].current.findIndex((v,i)=>i>0&&v>0);
  const tgtLv=gemState[activeGem].target.findIndex((v,i)=>i>0&&v>0);
  if(curLv>0){const{top,h}=gemLvToRect(curLv);gemHlCur.style.cssText=`display:block;top:${top}px;height:${h}px`}else gemHlCur.style.display="none";
  if(tgtLv>0){const{top,h}=gemLvToRect(tgtLv);gemHlTgt.style.cssText=`display:block;top:${top}px;height:${h}px`}else gemHlTgt.style.display="none";
}
function setGemClickH(){
  const trySet=()=>{
    const h=gemSpriteImg.offsetHeight;
    if(h>0){
      gemSpriteLeft.style.height=h+"px";
      gemSpriteRight.style.height=h+"px";
    } else {
      requestAnimationFrame(trySet);
    }
  };
  requestAnimationFrame(trySet);
}

function openGem(gem){
  activeGem=gem;activeGemMode="current";
  document.getElementById("gemModalTitle").textContent=GEM_INFO[gem].name+" の設定";
  document.querySelectorAll("#gemModal .modeBtn").forEach(b=>b.classList.toggle("active",b.dataset.mode==="current"));
  gemHlCur.style.display="none";gemHlTgt.style.display="none";gemHlHover.style.display="none";
  gemSpriteImg.src=GEM_INFO[gem].img;
  document.getElementById("gemModal").classList.add("show");
  if(gemSpriteImg.complete&&gemSpriteImg.naturalHeight){setGemClickH();updateGemHighlights();}
  else gemSpriteImg.onload=()=>{setGemClickH();updateGemHighlights();};
}
document.getElementById("gemSpriteWrap").addEventListener("pointermove",e=>{
  const rect=gemSpriteImg.getBoundingClientRect();const y=e.clientY-rect.top;
  if(y<0||y>gemSpriteImg.offsetHeight){gemHlHover.style.display="none";return}
  const{top,h}=gemLvToRect(gemYToLv(y));
  gemHlHover.style.cssText=`display:block;top:${top}px;height:${h}px`;
});
document.getElementById("gemSpriteWrap").addEventListener("pointerleave",()=>gemHlHover.style.display="none");
gemSpriteLeft.addEventListener("click",e=>{
  const rect=gemSpriteImg.getBoundingClientRect();
  openGemSetPop(gemYToLv(e.clientY-rect.top));
});
gemSpriteRight.addEventListener("click",e=>{
  const rect=gemSpriteImg.getBoundingClientRect();
  openGemCountPop(gemYToLv(e.clientY-rect.top));
});
document.querySelectorAll("#gemModal .modeBtn").forEach(btn=>btn.addEventListener("click",()=>{
  activeGemMode=btn.dataset.mode;
  document.querySelectorAll("#gemModal .modeBtn").forEach(b=>b.classList.toggle("active",b===btn));
  updateGemHighlights();
}));
document.getElementById("closeGemModal").onclick=()=>document.getElementById("gemModal").classList.remove("show");
document.getElementById("clearGemModal").onclick=()=>{
  gemState[activeGem].current=Array(17).fill(0);
  gemState[activeGem].target=Array(17).fill(0);
  updateGemHighlights();renderGem();
};

function openGemSetPop(lv){
  pending={type:"gem",gem:activeGem,mode:activeGemMode,lv};
  document.getElementById("popTitle").textContent=`Lv${lv}（${activeGemMode==="current"?"現在":"目標"}）一括設定`;
  const grid=document.getElementById("popGrid");const gridSet=document.getElementById("popGridSet");
  grid.innerHTML="";gridSet.style.display="none";
  const curQty=gemState[activeGem][activeGemMode][lv];
  const usedOther=gemTotal(activeGem,activeGemMode)-curQty;
  const totalUsedOther=gemAllTotal(activeGemMode)-gemTotal(activeGem,activeGemMode);
  const max=Math.min(6-usedOther,18-totalUsedOther-usedOther);
  [{label:"3set",qty:3},{label:"6set",qty:6}].forEach(({label,qty})=>{
    const b=document.createElement("button");
    const disabled=qty>max;
    b.className=curQty===qty?"popBtn main":"popBtn";
    b.style.opacity=disabled?"0.35":"1";b.disabled=disabled;
    b.textContent=label;b.onclick=()=>applyPop(qty);grid.appendChild(b);
  });
  document.getElementById("pop").classList.add("show");
}
function openGemCountPop(lv){
  pending={type:"gem",gem:activeGem,mode:activeGemMode,lv};
  document.getElementById("popTitle").textContent=`Lv${lv}（${activeGemMode==="current"?"現在":"目標"}）個数`;
  const grid=document.getElementById("popGrid");const gridSet=document.getElementById("popGridSet");
  grid.innerHTML="";gridSet.innerHTML="";gridSet.style.display="grid";
  const curQty=gemState[activeGem][activeGemMode][lv];
  const usedOther=gemTotal(activeGem,activeGemMode)-curQty;
  const totalUsedOther=gemAllTotal(activeGemMode)-gemTotal(activeGem,activeGemMode);
  const max=Math.min(6-usedOther,18-totalUsedOther-usedOther);
  for(let i=0;i<=6;i++){
    const b=document.createElement("button");const disabled=i>max;
    b.className=curQty===i?"popBtn main":"popBtn";
    b.style.opacity=disabled?"0.35":"1";b.disabled=disabled;
    b.textContent=i+"個";b.onclick=()=>applyPop(i);grid.appendChild(b);
  }
  [{label:"3set",qty:3},{label:"6set",qty:6}].forEach(({label,qty})=>{
    const b=document.createElement("button");const disabled=qty>max;
    b.className=curQty===qty?"popBtn main":"popBtn";
    b.style.opacity=disabled?"0.35":"1";b.disabled=disabled;
    b.textContent=label;b.onclick=()=>applyPop(qty);gridSet.appendChild(b);
  });
  document.getElementById("pop").classList.add("show");
}

// ===== 装備 =====
const GEAR_SLOT_NAMES=["部位1","部位2","部位3","部位4","部位5","部位6"];

function fillGearSelects(){
  const c=document.getElementById("gearBulkCurrent"),t=document.getElementById("gearBulkTarget");
  GEAR_LV_NAMES.forEach((name,i)=>{c.add(new Option(name,i));if(i>0)t.add(new Option(name,i))});
  c.value=0;t.value=20;
}

function gearApplyAll(){
  const c=Number(document.getElementById("gearBulkCurrent").value);
  const t=Number(document.getElementById("gearBulkTarget").value);
  gearState.current=Array(21).fill(0);gearState.target=Array(21).fill(0);
  gearState.current[c]=6;gearState.target[t]=6;
  renderGear();
}

function gearTotal(mode){return gearState[mode].reduce((s,v)=>s+v,0)}
function gearSummarize(a){const p=[];for(let i=0;i<21;i++)if(a[i])p.push(`${GEAR_LV_NAMES[i]}×${a[i]}`);return p.length?p.join(" / "):"未設定"}

function renderGearSlots(){
  const container=document.getElementById("gearSlots");
  container.innerHTML="";
  const ct=gearTotal("current"),tt=gearTotal("target");
  const div=document.createElement("div");
  div.className="gearSlot"+(ct>0||tt>0?" hasData":"");
  div.innerHTML=`<strong>装備設定</strong>現在：${gearSummarize(gearState.current)}<br>目標：${gearSummarize(gearState.target)}<br>設定：現在${ct}部位 / 目標${tt}部位`;
  container.appendChild(div);
}

function gearCalcAll(){
  const need={alloy:0,polish:0,plan:0,amber:0};
  const cur=[],tar=[];
  for(let lv=0;lv<21;lv++){
    for(let i=0;i<gearState.current[lv];i++)cur.push(lv);
    for(let i=0;i<gearState.target[lv];i++)tar.push(lv);
  }
  for(let i=0;i<Math.min(cur.length,tar.length);i++){
    const from=cur[i],to=tar[i];
    if(to<=from)continue;
    for(let lv=from;lv<to;lv++){
      const r=GEAR_COSTS[lv]||{};
      need.alloy+=r.alloy||0;need.polish+=r.polish||0;need.plan+=r.plan||0;need.amber+=r.amber||0;
    }
  }
  return need;
}

function renderGear(){
  renderGearSlots();
  // 中央ボタンのバッジ更新
  const btn=document.getElementById("gearCenterBtn");
  const ct=gearTotal("current"),tt=gearTotal("target");
  btn.innerHTML=`<span class="badge">${ct}/${tt}</span>`;
  const need=gearCalcAll();
  document.getElementById("needAlloy").textContent=fmt(need.alloy);
  document.getElementById("needPolish").textContent=fmt(need.polish);
  document.getElementById("needPlanG").textContent=fmt(need.plan);
  document.getElementById("needAmber").textContent=fmt(need.amber);
  document.getElementById("lackAlloy").textContent=fmt(Math.max(0,need.alloy-Number(document.getElementById("haveAlloy").value||0)));
  document.getElementById("lackPolish").textContent=fmt(Math.max(0,need.polish-Number(document.getElementById("havePolish").value||0)));
  document.getElementById("lackPlanG").textContent=fmt(Math.max(0,need.plan-Number(document.getElementById("havePlanG").value||0)));
  document.getElementById("lackAmber").textContent=fmt(Math.max(0,need.amber-Number(document.getElementById("haveAmber").value||0)));
  if(document.getElementById("gearModal").classList.contains("show"))updateGearHighlights();
}

// 装備モーダル

const gearHlCur=document.getElementById("gearHlCur");
const gearHlTgt=document.getElementById("gearHlTgt");

const gearSpriteWrap=document.getElementById("gearSpriteWrap");

function gearRowH(){return gearSpriteImg.offsetHeight/GEAR_ROWS}
function gearYToLv(y){return Math.min(GEAR_ROWS-1,Math.max(0,Math.floor(y/gearRowH())))}
function gearLvToRect(lv){const h=gearRowH();return{top:lv*h,h}}

function updateGearHighlights(){
  const imgH=gearSpriteImg.offsetHeight;if(!imgH)return;
  const curLv=gearState.current.findIndex(v=>v>0);

  if(tgtLv>=0){const{top,h}=gearLvToRect(tgtLv);gearHlTgt.style.cssText=`display:block;top:${top}px;height:${h}px`}else gearHlTgt.style.display="none";
}
function setGearClickH(){} // spriteWrap方式では不要

function openGearModal(){
  activeGearMode="current";
  document.getElementById("gearModalTitle").textContent="装備の設定【現在レベル】";
  document.querySelectorAll(".gearModeBtn").forEach(b=>b.classList.toggle("active",b.dataset.mode==="current"));

gearSpriteWrap.addEventListener("pointermove",e=>{
  const rect=gearSpriteImg.getBoundingClientRect();const y=e.clientY-rect.top;
  if(y<0||y>gearSpriteImg.offsetHeight){gearHlHover.style.display="none";return}
  const{top,h}=gearLvToRect(gearYToLv(y));
  gearHlHover.style.cssText=`display:block;top:${top}px;height:${h}px`;
});
gearSpriteWrap.addEventListener("pointerleave",()=>gearHlHover.style.display="none");
gearSpriteWrap.addEventListener("click",e=>{

let gearTouchStartY=0;
gearSpriteWrap.addEventListener("touchstart",e=>{

},{passive:true});

  const dy=Math.abs(e.changedTouches[0].clientY-gearTouchStartY);
  if(dy>10)return; // スクロールなので無視
  e.preventDefault();
  const touch=e.changedTouches[0];
  const rect=gearSpriteImg.getBoundingClientRect();
  const y=touch.clientY-rect.top;
  openGearLvPop(gearYToLv(y));
});

document.querySelectorAll(".gearModeBtn").forEach(btn=>btn.addEventListener("click",()=>{
  activeGearMode=btn.dataset.mode;
  document.querySelectorAll(".gearModeBtn").forEach(b=>b.classList.toggle("active",b===btn));
  document.getElementById("gearModalTitle").textContent=`装備の設定【${activeGearMode==="current"?"現在レベル":"目標レベル"}】`;
  updateGearHighlights();
}));
document.getElementById("closeGearModal").onclick=()=>document.getElementById("gearModal").classList.remove("show");
document.getElementById("clearGearModal").onclick=()=>{
  gearState.current=Array(21).fill(0);
  gearState.target=Array(21).fill(0);

};

function openGearLvPop(lv){
  pending={type:"gear",mode:activeGearMode,lv};
  document.getElementById("popTitle").textContent=`${GEAR_LV_NAMES[lv]}（${activeGearMode==="current"?"現在":"目標"}）個数`;
  const grid=document.getElementById("popGrid");const gridSet=document.getElementById("popGridSet");
  grid.innerHTML="";gridSet.style.display="none";
  const curQty=gearState[activeGearMode][lv];
  const usedOther=gearTotal(activeGearMode)-curQty;
  const max=6-usedOther;
  for(let i=0;i<=6;i++){
    const b=document.createElement("button");
    const disabled=i>max;
    b.className=curQty===i?"popBtn main":"popBtn";
    b.style.opacity=disabled?"0.35":"1";b.disabled=disabled;
    b.textContent=i+"部位";
    b.onclick=()=>{
      gearState[pending.mode][pending.lv]=i;
      document.getElementById("pop").classList.remove("show");
      renderGear();updateGearHighlights();
    };
    grid.appendChild(b);
  }
  document.getElementById("pop").classList.add("show");
}

// ポップ共通apply
function applyPop(qty){
  if(pending.type==="gem"){
    gemState[pending.gem][pending.mode][pending.lv]=qty;
  }
  document.getElementById("pop").classList.remove("show");
  renderGem();
}

// 宝石一括適用

    gemState[gem].current[c]=6;gemState[gem].target[t]=6;
  }
  renderGem();
}

document.querySelectorAll(".gemHot").forEach(btn=>btn.addEventListener("click",()=>openGem(btn.dataset.type)));
document.getElementById("gearCenterBtn").addEventListener("click",openGearModal);

document.getElementById("resetGem").onclick=()=>{for(const gem of Object.keys(gemState)){gemState[gem].current=Array(17).fill(0);gemState[gem].target=Array(17).fill(0)}renderGem()};
document.getElementById("resetGear").onclick=()=>{gearState.current=Array(21).fill(0);gearState.target=Array(21).fill(0);renderGear()};

document.getElementById("popClose").onclick=()=>document.getElementById("pop").classList.remove("show");
["havePlan","haveBook","haveSecret"].forEach(id=>document.getElementById(id).addEventListener("input",renderGem));
["haveAlloy","havePolish","havePlanG","haveAmber"].forEach(id=>document.getElementById(id).addEventListener("input",renderGear));

document.getElementById("gearApplyAll").onclick=gearApplyAll;
fillSelects();
fillGearSelects();
renderGem();
renderGear();
