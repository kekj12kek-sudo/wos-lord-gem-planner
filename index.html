<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>宝石LvUP Planner</title>
<style>
:root{--bg:#061524;--panel:#0d3150;--line:#78d4ff55;--text:#eefaff;--muted:#add5eb;--gold:#ffc34a;--red:#e93848}*{box-sizing:border-box}body{margin:0;color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(180deg,#061524,#0b2b45 55%,#061524);font-weight:800}.app{max-width:760px;margin:0 auto;padding:14px 10px 34px}.header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.title{background:#0e3151;border:1px solid var(--line);border-radius:16px;padding:10px 14px;font-size:20px;box-shadow:0 7px 18px #0008}.tabs{display:flex;gap:8px}.tab{border:0;border-radius:999px;padding:10px 14px;color:#fff;background:#176596;font-weight:1000;box-shadow:inset 0 2px 0 #ffffff33,0 4px 10px #0008}.tab.active{background:linear-gradient(#ffcf62,#f39d22);color:#201100}.card{background:#0e3151dd;border:1px solid var(--line);border-radius:20px;padding:12px;margin:10px 0;box-shadow:0 8px 20px #0008}.cardTitle{font-size:13px;color:#d8f1ff;margin-bottom:8px}.levelBox{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field label{display:block;font-size:12px;color:#aad8ef;margin:0 0 6px 4px}select,input{width:100%;border:1px solid #8bd8ff66;background:#071d31;color:#fff;border-radius:12px;padding:12px;font-size:16px;font-weight:900;outline:none}.bulkBtn{width:100%;border:1px solid #8bd8ff66;background:#12446f;color:#fff;border-radius:14px;padding:12px;font-size:16px;font-weight:1000;box-shadow:inset 0 2px 0 #ffffff22}.help{font-size:12px;color:#d8f1ff;margin-top:8px}.stage{position:relative;border-radius:22px;overflow:hidden;aspect-ratio:1403/1121;background:#0c2f4d;box-shadow:0 10px 28px #0009;border:1px solid #7bd3ff33;margin-top:10px}.stageImg{position:absolute;inset:0;background-image:url('gem_bg.webp');background-size:cover;background-position:center}.gemHot{position:absolute;width:10%;aspect-ratio:1;border:0;padding:0;background:transparent;transform:translate(-50%,-50%);cursor:pointer;z-index:5}.gemHot img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 7px 7px #0008)}.gemHot[data-type="shield"]{left:50%;top:28%}.gemHot[data-type="lancer"]{left:35%;top:62%}.gemHot[data-type="marks"]{left:65%;top:62%}.badge{position:absolute;right:-14px;top:-8px;min-width:34px;height:28px;display:grid;place-items:center;padding:0 6px;background:linear-gradient(#ff6d78,#d82337);border:3px solid #fff;border-radius:999px;color:#fff;font-size:13px;line-height:1;box-shadow:0 3px 8px #0009;z-index:8}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.gemSummary{background:#09243b;border:1px solid #7bd3ff44;border-radius:16px;padding:10px;text-align:center;font-size:13px}.gemSummary strong{display:block;font-size:15px;color:#fff}.totalBox{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.resultItem{background:#09243b;border:1px solid #7bd3ff33;border-radius:14px;padding:10px}.resultItem.lack{border-color:#ff667766;background:#351725}.resultLabel{color:#a8d8ef;font-size:12px}.resultValue{font-size:20px;color:#fff;margin-top:4px}.reset{width:100%;border:1px solid #ffbd5c88;background:linear-gradient(#ffcc64,#e8941d);color:#231200;border-radius:16px;padding:12px;font-size:16px;font-weight:1000;margin-top:12px}

/* モーダル */
.modalOverlay{position:fixed;inset:0;background:#0009;display:none;align-items:center;justify-content:center;z-index:1000;padding:14px}.modalOverlay.show{display:flex}.modal{width:min(520px,100%);max-height:90vh;display:flex;flex-direction:column;background:#0e3151;border:1px solid #8bd8ff77;border-radius:18px;box-shadow:0 12px 35px #000c;overflow:hidden}.modalHead{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #8bd8ff33;flex-shrink:0}.modalTitle{font-size:18px}.closeBtn{border:0;background:#072035;color:#fff;border-radius:12px;padding:10px 12px;font-weight:1000}.modalTabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;flex-shrink:0}.modeBtn{border:1px solid #8bd8ff66;background:#08243d;color:#fff;border-radius:14px;padding:12px;font-weight:1000}.modeBtn.active{background:linear-gradient(#ffcf62,#f39d22);color:#201100}

/* スプライト画像タップエリア */
.spriteWrap{flex:1;overflow:hidden;position:relative;display:flex;justify-content:center;padding:0 12px 12px}
.spriteInner{position:relative;display:inline-block;cursor:pointer;user-select:none}
.spriteInner img{display:block;max-height:58vh;width:auto}
/* ハイライトオーバーレイ */
.spriteHighlight{position:absolute;left:0;right:0;pointer-events:none;border-radius:8px;transition:top .1s,height .1s}
.spriteHighlight.cur{background:#4af07a33;border:2px solid #4af07a88}
.spriteHighlight.tgt{background:#ff9f3333;border:2px solid #ff9f3388}
/* ホバーライン */
.spriteHover{position:absolute;left:0;right:0;pointer-events:none;border-radius:8px;background:#ffffff22;border:2px solid #ffffff55}
/* Lvラベル列 */
.lvLabels{position:absolute;left:-44px;top:0;bottom:0;display:flex;flex-direction:column}
.lvLabel{flex:1;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:11px;color:#aad8ef}

/* カウントポップ */
.pop{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:1100;background:#0007;padding:14px}.pop.show{display:flex}.popBox{width:min(420px,100%);background:#0e3151;border:1px solid #8bd8ff77;border-radius:18px;padding:14px}.popTitle{margin-bottom:10px}.popGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.popBtn{border:0;background:#15537f;color:#fff;border-radius:12px;padding:14px 8px;font-size:16px;font-weight:1000}.popBtn.main{background:linear-gradient(#ffcf62,#f39d22);color:#201100}.popClose{margin-top:10px;width:100%;border:1px solid #8bd8ff66;background:#061d31;color:#fff;border-radius:12px;padding:12px;font-weight:1000}

@media(max-width:520px){.app{padding:10px 8px 26px}.title{font-size:16px}.tab{font-size:13px;padding:9px 10px}.levelBox{grid-template-columns:1fr}.stage{border-radius:18px}.summary,.totalBox{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">宝石LvUP Planner</div>
    <div class="tabs"><button class="tab active">宝石LvUP</button><button class="tab">装備強化</button></div>
  </div>
  <div class="card">
    <div class="levelBox">
      <div class="field"><label>現在Lv</label><select id="bulkCurrent"></select></div>
      <div class="field"><label>目標Lv</label><select id="bulkTarget"></select></div>
    </div>
    <button class="bulkBtn" id="applyAll">全宝石に一括適用</button>
    <div class="help">宝石タップ＝個別設定 / 現在Lv＝緑ハイライト / 目標Lv＝橙ハイライト</div>
  </div>
  <div class="stage" id="stage">
    <div class="stageImg"></div>
    <button class="gemHot" data-type="shield" aria-label="盾宝石"><img src="gem_green.png" alt="盾宝石"><span class="badge" id="badge-shield">0個</span></button>
    <button class="gemHot" data-type="lancer" aria-label="槍宝石"><img src="gem_blue.png" alt="槍宝石"><span class="badge" id="badge-lancer">0個</span></button>
    <button class="gemHot" data-type="marks" aria-label="弓宝石"><img src="gem_orange.png" alt="弓宝石"><span class="badge" id="badge-marks">0個</span></button>
  </div>
  <div class="summary">
    <div class="gemSummary" id="sum-shield"><strong>盾宝石</strong>現在：未設定<br>目標：未設定</div>
    <div class="gemSummary" id="sum-lancer"><strong>槍宝石</strong>現在：未設定<br>目標：未設定</div>
    <div class="gemSummary" id="sum-marks"><strong>弓宝石</strong>現在：未設定<br>目標：未設定</div>
  </div>
  <div class="card">
    <div class="cardTitle">所持素材</div>
    <div class="levelBox">
      <div class="field"><label>宝石図面</label><input id="havePlan" type="number" min="0" value="0"></div>
      <div class="field"><label>宝石ハンドブック</label><input id="haveBook" type="number" min="0" value="0"></div>
      <div class="field"><label>宝石秘典</label><input id="haveSecret" type="number" min="0" value="0"></div>
    </div>
  </div>
  <div class="card">
    <div class="cardTitle">必要素材</div>
    <div class="totalBox">
      <div class="resultItem"><div class="resultLabel">宝石図面</div><div class="resultValue" id="needPlan">0</div></div>
      <div class="resultItem"><div class="resultLabel">宝石ハンドブック</div><div class="resultValue" id="needBook">0</div></div>
      <div class="resultItem"><div class="resultLabel">宝石秘典</div><div class="resultValue" id="needSecret">0</div></div>
    </div>
    <div class="cardTitle" style="margin-top:14px">不足素材</div>
    <div class="totalBox">
      <div class="resultItem lack"><div class="resultLabel">宝石図面</div><div class="resultValue" id="lackPlan">0</div></div>
      <div class="resultItem lack"><div class="resultLabel">宝石ハンドブック</div><div class="resultValue" id="lackBook">0</div></div>
      <div class="resultItem lack"><div class="resultLabel">宝石秘典</div><div class="resultValue" id="lackSecret">0</div></div>
    </div>
    <button class="reset" id="resetAll">設定をリセット</button>
  </div>
</div>

<!-- モーダル -->
<div class="modalOverlay" id="modalOverlay">
  <div class="modal">
    <div class="modalHead">
      <div class="modalTitle" id="modalTitle">宝石の設定</div>
      <button class="closeBtn" id="closeModal">閉じる</button>
    </div>
    <div class="modalTabs">
      <button class="modeBtn active" data-mode="current">現在レベル</button>
      <button class="modeBtn" data-mode="target">目標レベル</button>
    </div>
    <!-- スプライト画像タップUI -->
    <div class="spriteWrap">
      <div class="spriteInner" id="spriteInner">
        <img id="spriteImg" src="" alt="">
        <div class="spriteHighlight cur" id="hlCur" style="display:none"></div>
        <div class="spriteHighlight tgt" id="hlTgt" style="display:none"></div>
        <div class="spriteHover" id="hlHover" style="display:none"></div>
        <div class="lvLabels" id="lvLabels"></div>
      </div>
    </div>
  </div>
</div>

<!-- 個数ポップ -->
<div class="pop" id="pop">
  <div class="popBox">
    <div class="popTitle" id="popTitle">個数を選択</div>
    <div class="popGrid" id="popGrid"></div>
    <button class="popClose" id="popClose">閉じる</button>
  </div>
</div>

<script>
const GEM_COSTS={0:{plan:5,book:5,secret:0},1:{plan:15,book:40,secret:0},2:{plan:40,book:60,secret:0},3:{plan:100,book:80,secret:0},4:{plan:200,book:100,secret:0},5:{plan:300,book:120,secret:0},6:{plan:400,book:140,secret:0},7:{plan:400,book:200,secret:0},8:{plan:400,book:300,secret:0},9:{plan:420,book:420,secret:0},10:{plan:420,book:560,secret:0},11:{plan:450,book:580,secret:15},12:{plan:450,book:580,secret:30},13:{plan:500,book:600,secret:45},14:{plan:500,book:600,secret:70},15:{plan:550,book:650,secret:100}};
const GEM_INFO={shield:{name:"盾宝石",img:"gem_green.png"},lancer:{name:"槍宝石",img:"gem_blue.png"},marks:{name:"弓宝石",img:"gem_orange.png"}};
const state={shield:{current:Array(17).fill(0),target:Array(17).fill(0)},lancer:{current:Array(17).fill(0),target:Array(17).fill(0)},marks:{current:Array(17).fill(0),target:Array(17).fill(0)}};
let activeGem="shield", activeMode="current", pending={gem:null,mode:null,lv:null};

function fmt(n){return Number(n||0).toLocaleString("ja-JP")}
function fillSelects(){const c=document.getElementById("bulkCurrent"),t=document.getElementById("bulkTarget");for(let i=0;i<=16;i++)c.add(new Option("Lv"+i,i));for(let i=1;i<=16;i++)t.add(new Option("Lv"+i,i));c.value=1;t.value=16}
function lvColor(lv){if(lv<=2)return"green";if(lv<=4)return"blue";if(lv<=7)return"purple";if(lv<=11)return"orange";return"red"}
function total(a){return a.reduce((x,y)=>x+y,0)}
function summarize(a){const p=[];for(let lv=0;lv<=16;lv++)if(a[lv])p.push(`Lv${lv}×${a[lv]}`);return p.length?p.join(" / "):"未設定"}

function buildPairs(gem){const cur=[],tar=[];for(let lv=0;lv<=16;lv++){for(let i=0;i<state[gem].current[lv];i++)cur.push(lv);for(let i=0;i<state[gem].target[lv];i++)tar.push(lv)}const len=Math.min(cur.length,tar.length),pairs=[];for(let i=0;i<len;i++)if(tar[i]>cur[i])pairs.push({from:cur[i],to:tar[i]});return pairs}
function calcOne(from,to){let plan=0,book=0,secret=0;for(let lv=from;lv<to;lv++){const r=GEM_COSTS[lv]||{plan:0,book:0,secret:0};plan+=r.plan;book+=r.book;secret+=r.secret}return{plan,book,secret}}
function calcAll(){const need={plan:0,book:0,secret:0};for(const gem of Object.keys(state))for(const p of buildPairs(gem)){const c=calcOne(p.from,p.to);need.plan+=c.plan;need.book+=c.book;need.secret+=c.secret}return need}

function render(){
  for(const gem of Object.keys(GEM_INFO)){
    const ct=total(state[gem].current),tt=total(state[gem].target);
    document.getElementById("badge-"+gem).textContent=ct+"個";
    document.getElementById("sum-"+gem).innerHTML=`<strong>${GEM_INFO[gem].name}</strong>現在：${summarize(state[gem].current)}<br>目標：${summarize(state[gem].target)}<br>設定：現在${ct}個 / 目標${tt}個`;
  }
  const need=calcAll();
  needPlan.textContent=fmt(need.plan);needBook.textContent=fmt(need.book);needSecret.textContent=fmt(need.secret);
  lackPlan.textContent=fmt(Math.max(0,need.plan-Number(havePlan.value||0)));
  lackBook.textContent=fmt(Math.max(0,need.book-Number(haveBook.value||0)));
  lackSecret.textContent=fmt(Math.max(0,need.secret-Number(haveSecret.value||0)));
  if(modalOverlay.classList.contains("show"))updateHighlights();
}

// スプライトUI
const spriteImg=document.getElementById("spriteImg");
const spriteInner=document.getElementById("spriteInner");
const hlCur=document.getElementById("hlCur");
const hlTgt=document.getElementById("hlTgt");
const hlHover=document.getElementById("hlHover");
const lvLabels=document.getElementById("lvLabels");
const ROWS=16;

function lvToY(lv, imgH){
  // lv は 1-16
  const rowH = imgH / ROWS;
  return {top:(lv-1)*rowH, h:rowH};
}

function yToLv(y, imgH){
  return Math.min(16, Math.max(1, Math.ceil(y / (imgH/ROWS))));
}

function updateHighlights(){
  const imgH = spriteImg.offsetHeight;
  if(!imgH) return;

  // 現在Lv highlight (最初の設定Lvを使う)
  const curLv = state[activeGem].current.findIndex((v,i)=>i>0&&v>0);
  const tgtLv = state[activeGem].target.findIndex((v,i)=>i>0&&v>0);

  if(curLv>0){
    const {top,h}=lvToY(curLv,imgH);
    hlCur.style.cssText=`display:block;top:${top}px;height:${h}px`;
  } else { hlCur.style.display="none"; }

  if(tgtLv>0){
    const {top,h}=lvToY(tgtLv,imgH);
    hlTgt.style.cssText=`display:block;top:${top}px;height:${h}px`;
  } else { hlTgt.style.display="none"; }

  // Lvラベル
  if(!lvLabels.children.length){
    for(let lv=1;lv<=16;lv++){
      const el=document.createElement("div");
      el.className="lvLabel";
      el.textContent="Lv"+lv;
      lvLabels.appendChild(el);
    }
  }
}

function openGem(gem){
  activeGem=gem;
  activeMode="current";
  modalTitle.textContent=GEM_INFO[gem].name+" の設定";
  document.querySelectorAll(".modeBtn").forEach(b=>b.classList.toggle("active",b.dataset.mode===activeMode));
  spriteImg.src=GEM_INFO[gem].img;
  modalOverlay.classList.add("show");
  lvLabels.innerHTML="";
  spriteImg.onload=()=>updateHighlights();
  if(spriteImg.complete) updateHighlights();
}

// ホバー＆タップ
spriteInner.addEventListener("pointermove",e=>{
  const rect=spriteImg.getBoundingClientRect();
  const y=e.clientY-rect.top;
  const imgH=spriteImg.offsetHeight;
  if(y<0||y>imgH){hlHover.style.display="none";return;}
  const lv=yToLv(y,imgH);
  const {top,h}=lvToY(lv,imgH);
  hlHover.style.cssText=`display:block;top:${top}px;height:${h}px`;
});
spriteInner.addEventListener("pointerleave",()=>hlHover.style.display="none");

spriteInner.addEventListener("pointerup",e=>{
  const rect=spriteImg.getBoundingClientRect();
  const y=e.clientY-rect.top;
  const imgH=spriteImg.offsetHeight;
  const lv=yToLv(y,imgH);
  openCountPop(lv);
});

function openCountPop(lv){
  pending={gem:activeGem,mode:activeMode,lv};
  popTitle.textContent=`Lv${lv} の個数（${activeMode==="current"?"現在":"目標"}）`;
  popGrid.innerHTML="";
  for(let i=0;i<=6;i++){
    const b=document.createElement("button");
    b.className=i===state[activeGem][activeMode][lv]?"popBtn main":"popBtn";
    b.textContent=i+"個";
    b.onclick=()=>applyCount(i);
    popGrid.appendChild(b);
  }
  // 3set/6set ボタン
  ["3set","6set"].forEach(label=>{
    const b=document.createElement("button");
    b.className="popBtn";b.textContent=label;
    b.onclick=()=>applyCount(label==="3set"?3:6);
    popGrid.appendChild(b);
  });
  pop.classList.add("show");
}

function applyCount(qty){
  state[pending.gem][pending.mode]=Array(17).fill(0);
  state[pending.gem][pending.mode][pending.lv]=qty;
  pop.classList.remove("show");
  render();
}

function applyAll(){
  const c=Number(bulkCurrent.value),t=Number(bulkTarget.value);
  for(const gem of Object.keys(state)){
    state[gem].current=Array(17).fill(0);state[gem].target=Array(17).fill(0);
    state[gem].current[c]=6;state[gem].target[t]=6;
  }
  render();
}
function resetAll(){for(const gem of Object.keys(state)){state[gem].current=Array(17).fill(0);state[gem].target=Array(17).fill(0)}render()}

document.querySelectorAll(".gemHot").forEach(b=>b.addEventListener("click",()=>openGem(b.dataset.type)));
document.querySelectorAll(".modeBtn").forEach(b=>b.addEventListener("click",()=>{
  activeMode=b.dataset.mode;
  document.querySelectorAll(".modeBtn").forEach(x=>x.classList.toggle("active",x===b));
}));
closeModal.onclick=()=>modalOverlay.classList.remove("show");
popClose.onclick=()=>pop.classList.remove("show");
document.getElementById("applyAll").onclick=applyAll;
document.getElementById("resetAll").onclick=resetAll;
["havePlan","haveBook","haveSecret"].forEach(id=>document.getElementById(id).addEventListener("input",render));
fillSelects();render();
</script>
</body>
</html>
